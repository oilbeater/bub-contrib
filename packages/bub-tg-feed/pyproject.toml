[project]
name = "bub-tg-feed"
version = "0.1.0"
description = "Bub channel for github.com/frostming/tg-message-feed"
authors = [
    { name = "Frost Ming", email = "me@frostming.com" }
]
requires-python = ">=3.12"
dependencies = [
    "aio-pika>=9.6.1",
    "aiohttp>=3.13.3",
    "bub>=0.3.0",
]

[project.entry-points.bub]
tg-feed = "bub_tg_feed.plugin"

[build-system]
requires = ["uv_build>=0.9.7,<0.10.0"]
build-backend = "uv_build"
