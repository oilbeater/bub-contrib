[project]
name = "bub-wecom"
version = "0.1.0"
description = "WeCom channel for Bub"
readme = "README.md"
authors = [
    { name = "Ruter", email = "i@ruterly.com" }
]
requires-python = ">=3.12"
dependencies = [
    "wecom-aibot-python-sdk>=1.0.2",
]

[project.entry-points.bub]
wecom = "bub_wecom.plugin"

[build-system]
requires = ["uv_build>=0.10.4,<0.11.0"]
build-backend = "uv_build"
