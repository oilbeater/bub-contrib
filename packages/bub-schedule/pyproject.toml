[project]
name = "bub-schedule"
version = "0.1.0"
description = "Scheduling tools for Bub"
authors = [
    { name = "Frost Ming", email = "me@frostming.com" }
]
requires-python = ">=3.12"
dependencies = [
    "apscheduler>=3.11.2",
    "republic>=0.5.6",
]

[project.entry-points.bub]
schedule = "bub_schedule.plugin:main"

[build-system]
requires = ["uv_build>=0.9.7,<0.10.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pytest>=9.0.3",
]
