[project]
name = "bub-feishu"
version = "0.1.0"
description = "Feishu channel for Bub"
readme = "README.md"
authors = [
    { name = "Kyle Liu", email = "specter119@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "bub>=0.3.0a1",
    "lark-oapi>=1.4.20",
    "pydantic-settings>=2.10.1",
]

[project.entry-points.bub]
feishu = "bub_feishu.plugin"

[build-system]
requires = ["uv_build>=0.10.4,<0.11.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = ["bub_feishu", "bub_skills.feishu"]
source-include = ["src/bub_skills/feishu/SKILL.md", "src/bub_skills/feishu/scripts/*.py"]
