[project]
name = "bub-discord"
version = "0.1.0"
description = "Discord channel for Bub"
readme = "README.md"
authors = [
    { name = "Frost Ming", email = "me@frostming.com" }
]
requires-python = ">=3.12"
dependencies = [
    "bub>=0.3.0a1",
    "discord-py>=2.7.1",
]

[project.entry-points.bub]
discord = "bub_discord.plugin"

[build-system]
requires = ["pdm-backend"]
build-backend = "pdm.backend"

[tool.pdm.build]
includes = ["src/"]
